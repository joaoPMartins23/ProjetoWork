<div class="notFound">
  <div class="conteudoNotFound" role="group" aria-labelledby="nf-title">
    <div class="containerCabecalho">
      <img src="/assets/images/pages/notFound/notFound.png" alt="Erro 404" loading="lazy" decoding="async" />
      <h1 id="nf-title">Página não encontrada!</h1>
    </div>

    <div class="containerCorpo">
      <p>A página que você procura pode ter sido movida, excluída ou nunca existido!</p>
      <p>Se necessário, entre em contato com o departamento de TI.</p>
    </div>

    <a class="btn-voltar" [routerLink]="['/']" aria-label="Voltar para a página inicial">Voltar</a>
  </div>
</div>
